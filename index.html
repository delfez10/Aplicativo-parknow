<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ParkNow — Login</title>
  <link rel="icon" href="favicon.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="auth-body">
  <main class="auth-wrap">
    <!-- Seletor de modo -->
    <div class="mode-switch">
      <button class="mode-btn active" data-mode="client">Sou Cliente</button>
      <button class="mode-btn" data-mode="admin">Sou Administrador</button>
    </div>

    <!-- ===== Painel CLIENTE ===== -->
    <section id="clientPanel" class="auth-card client-card active">
      <div class="brand">
        <div class="brand-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="26" height="26"><path d="M5 13l1.5-4.5A2 2 0 0 1 8.4 7h7.2a2 2 0 0 1 1.9 1.5L19 13"/><rect x="3" y="13" width="18" height="6" rx="1.5"/><circle cx="7.5" cy="18.5" r="1.3"/><circle cx="16.5" cy="18.5" r="1.3"/></svg></div>
        <h1>ParkNow</h1>
        <p class="muted">Área do Cliente</p>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="login">Entrar</button>
        <button class="tab" data-tab="register">Cadastrar</button>
      </div>

      <form id="loginForm" class="form active">
        <label>Usuário
          <input type="text" id="loginUser" required autocomplete="username" />
        </label>
        <label>Senha
          <input type="password" id="loginPass" required autocomplete="current-password" />
        </label>
        <button type="submit" class="btn primary">Entrar</button>
      </form>

      <form id="registerForm" class="form">
        <label>Nome completo
          <input type="text" id="regName" required />
        </label>
        <label>Usuário
          <input type="text" id="regUser" required />
        </label>
        <label>Senha
          <input type="password" id="regPass" required minlength="4" />
        </label>
        <button type="submit" class="btn primary">Solicitar cadastro</button>
        <p class="hint">Sua conta passará por aprovação do administrador.</p>
      </form>

      <p id="authMsg" class="auth-msg"></p>
    </section>

    <!-- ===== Painel ADMIN ===== -->
    <section id="adminPanel" class="auth-card admin-card">
      <div class="admin-badge">
        <div class="lock-icon">⚙</div>
        <h1>Acesso Restrito</h1>
        <p class="muted small">Painel Administrativo · ParkNow</p>
      </div>

      <form id="adminLoginForm" class="form active">
        <label>Usuário administrador
          <input type="text" id="adminUser" required autocomplete="username" />
        </label>
        <label>Senha
          <input type="password" id="adminPass" required autocomplete="current-password" />
        </label>
        <button type="submit" class="btn admin-btn">Acessar painel</button>
        <p class="hint">Somente administradores autorizados.</p>
      </form>

      <p id="adminAuthMsg" class="auth-msg"></p>
    </section>

    <!-- Informações do sistema -->
    <section class="auth-card" style="display:block">
      <h2 style="margin-bottom:0.6rem">Informações do Sistema</h2>
      <div class="info-row" style="display:flex;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid var(--border);font-size:0.88rem">
        <span class="muted">Sistema</span>
        <strong>ParkNow</strong>
      </div>
      <div class="info-row" style="display:flex;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid var(--border);font-size:0.88rem">
        <span class="muted">E-mail</span>
        <strong>contato@parknow.com</strong>
      </div>
      <div class="info-row" style="display:flex;justify-content:space-between;padding:0.4rem 0;font-size:0.88rem">
        <span class="muted">Telefone</span>
        <strong>(11) 99999-9999</strong>
      </div>
    </section>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
